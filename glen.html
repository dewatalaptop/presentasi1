<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1a">
<title>MOLE MASH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ═══════ RESET ═══════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

:root{
–bg:#0d0d1a;–bg2:#13132a;–border:#2a2a4a;
–gold:#ffd700;–gold-d:#7a5000;
–green:#00ff88;–red:#ff4455;–blue:#44aaff;
–dirt:#7b4f2e;–dirt-d:#4a2e18;
–grass:#3a9e3a;–grass-d:#2a7a2a;
–mole:#8b5513;–belly:#c8845a;
–font:‘Press Start 2P’,monospace;

/* fluid hole size: fits 3 across with gaps on any screen */
–hole: clamp(72px, calc((100vw - 80px) / 3), 130px);
–gap:  clamp(6px, 2vw, 18px);

–hud-fs:   clamp(14px, 3.8vw, 22px);
–title-fs: clamp(13px, 4.2vw, 30px);
–lbl-fs:   clamp(5px, 1.4vw, 8px);
–btn-fs:   clamp(8px, 1.9vw, 12px);

–safe-top:    env(safe-area-inset-top, 0px);
–safe-bottom: env(safe-area-inset-bottom, 0px);
}

html,body{height:100%;overflow:hidden;overscroll-behavior:none}

body{
font-family:var(–font);
background:var(–bg);
color:#fff;
height:100dvh;
display:flex;flex-direction:column;align-items:center;
position:relative;
padding:var(–safe-top) 0 var(–safe-bottom);
}

/* ═══════ BG ═══════ */
body::before{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background:
radial-gradient(ellipse 70% 45% at 15% 8%,  #1c1c50 0%,transparent 65%),
radial-gradient(ellipse 55% 40% at 85% 92%, #0a2a0a 0%,transparent 65%);
}
body::after{
content:’’;position:fixed;inset:0;pointer-events:none;z-index:0;
background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px);
}

/* ═══════ STARS ═══════ */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.s{position:absolute;border-radius:50%;background:#fff;animation:tw var(–d,2s) var(–dl,0s) infinite alternate ease-in-out}
@keyframes tw{from{opacity:.1}to{opacity:.9}}

/* ═══════ LAYOUT ═══════ */
.layout{
position:relative;z-index:1;
width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;
justify-content:space-evenly;
padding:clamp(4px,1.2vh,10px) clamp(8px,3vw,24px);
gap:clamp(3px,.8vh,8px);
}

/* ═══════ TITLE ═══════ */
.title{font-size:var(–title-fs);color:var(–gold);letter-spacing:clamp(2px,.6vw,5px);
text-shadow:3px 3px 0 var(–gold-d),-1px -1px 0 #000,0 0 20px #ffaa0088;
animation:glow 2.5s ease-in-out infinite alternate;text-align:center;line-height:1.2}
.subtitle{font-size:var(–lbl-fs);color:#445;letter-spacing:2px;text-align:center;margin-top:3px}
@keyframes glow{
from{text-shadow:3px 3px 0 var(–gold-d),-1px -1px 0 #000,0 0 6px #ffaa0044}
to  {text-shadow:3px 3px 0 var(–gold-d),-1px -1px 0 #000,0 0 26px #ffaa00bb}
}

/* ═══════ HUD ═══════ */
.hud{
display:flex;gap:clamp(5px,1.5vw,12px);
width:100%;max-width:calc(var(–hole)*3 + var(–gap)*2 + 32px);
justify-content:center;flex-shrink:0
}
.hc{
flex:1;min-width:0;
background:var(–bg2);border:2px solid var(–border);
box-shadow:0 0 0 1px #000,3px 3px 0 #000;
padding:clamp(4px,1vh,9px) clamp(4px,.8vw,8px);
text-align:center
}
.hl{font-size:var(–lbl-fs);color:#446;letter-spacing:1px;margin-bottom:3px;white-space:nowrap}
.hv{font-size:var(–hud-fs);line-height:1;transition:transform .1s}
.hv.sc{color:var(–green);text-shadow:0 0 10px var(–green)}
.hv.tc{color:var(–gold); text-shadow:0 0 10px var(–gold)}
.hv.lc{color:var(–blue); text-shadow:0 0 10px var(–blue)}
.hv.bc{color:var(–gold); text-shadow:0 0 10px var(–gold)}
.hv.pop{animation:cpop .15s ease-out}
@keyframes cpop{0%{transform:scale(1)}50%{transform:scale(1.38)}100%{transform:scale(1)}}
#tv.urgent{color:var(–red)!important;text-shadow:0 0 14px var(–red)!important;animation:blink .4s step-start infinite}
@keyframes blink{50%{opacity:.2}}

/* ═══════ META ROW ═══════ */
.meta{
width:100%;max-width:calc(var(–hole)*3 + var(–gap)*2 + 32px);
flex-shrink:0;display:flex;flex-direction:column;gap:3px
}
.ptrack{height:clamp(6px,1.2vw,10px);background:#090914;border:2px solid var(–border);overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(–green),var(–gold));box-shadow:0 0 6px var(–green);width:0%;transition:width .3s ease}
.cline{font-size:clamp(6px,1.6vw,10px);color:var(–red);text-shadow:0 0 8px var(–red);text-align:center;min-height:14px;letter-spacing:1px}

/* ═══════ GRID SHELL ═══════ */
.shell{
flex-shrink:0;
background:rgba(0,0,0,.42);
border:2px solid var(–border);
box-shadow:0 0 0 1px #000,5px 5px 0 #000;
padding:clamp(8px,2vw,14px)
}
.grid{
display:grid;
grid-template-columns:repeat(3,var(–hole));
grid-template-rows:repeat(3,var(–hole));
gap:var(–gap)
}

/* ═══════ HOLE ═══════ */
.hole{
width:var(–hole);height:var(–hole);
position:relative;overflow:hidden;cursor:crosshair;
background:radial-gradient(ellipse at 50% 80%,var(–dirt) 0%,var(–dirt-d) 100%);
border:2px solid #000;
box-shadow:inset 0 6px 16px rgba(0,0,0,.65);
-webkit-user-select:none;user-select:none;
}
/* grass rim */
.hole::after{
content:’’;position:absolute;top:0;left:0;right:0;height:14%;
background:linear-gradient(180deg,#55c855 0%,var(–grass) 55%,var(–grass-d) 100%);
border-bottom:2px solid #1a5a1a;z-index:4
}
/* dirt specks */
.hole::before{
content:’’;position:absolute;inset:0;z-index:1;
background-image:
radial-gradient(1.5px 1.5px at 22% 58%,rgba(0,0,0,.35) 0%,transparent 100%),
radial-gradient(1.5px 1.5px at 68% 72%,rgba(0,0,0,.35) 0%,transparent 100%),
radial-gradient(1.5px 1.5px at 48% 88%,rgba(0,0,0,.25) 0%,transparent 100%)
}

/* ═══════ MOLE ═══════ */
.mole{
position:absolute;
bottom:-108%;left:50%;transform:translateX(-50%);
width:68%;height:76%;z-index:2;pointer-events:none;
transition:bottom .17s cubic-bezier(.34,1.45,.64,1)
}
/* body */
.mb{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
width:88%;height:82%;background:var(–mole);border:2px solid #000;
border-radius:44% 44% 30% 30%/54% 54% 46% 46%}
.mb::after{content:’’;position:absolute;bottom:8%;left:50%;transform:translateX(-50%);
width:46%;height:36%;background:var(–belly);border:2px solid #000;border-radius:50%}
/* ears */
.me{position:absolute;top:-12%;width:24%;height:26%;
background:var(–mole);border:2px solid #000;border-radius:50% 50% 0 0;z-index:3}
.me::after{content:’’;position:absolute;top:20%;left:50%;transform:translateX(-50%);
width:44%;height:48%;background:var(–belly);border-radius:50%}
.me.l{left:8%}.me.r{right:8%}
/* face */
.mf{position:absolute;bottom:38%;left:50%;transform:translateX(-50%);width:88%;height:44%}
/* eyes */
.mey{position:absolute;top:10%;width:20%;height:28%;
background:#111;border-radius:50%;border:2px solid #000}
.mey::after{content:’’;position:absolute;top:14%;left:38%;
width:36%;height:36%;background:#fff;border-radius:50%}
.mey.l{left:12%}.mey.r{right:12%}
/* nose */
.mn{position:absolute;top:42%;left:50%;transform:translateX(-50%);
width:26%;height:22%;background:#ff8888;border:2px solid #000;border-radius:50%}
/* mouth */
.mm{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);
width:42%;height:18%;
border-bottom:2px solid #000;border-left:2px solid #000;border-right:2px solid #000;
border-radius:0 0 50% 50%}
/* paws */
.mp{position:absolute;bottom:-8%;width:28%;height:16%;
background:var(–mole);border:2px solid #000;border-radius:50% 50% 40% 40%;z-index:3}
.mp.l{left:4%}.mp.r{right:4%}

/* ACTIVE */
.hole.active .mole{bottom:6%}
/* WHACKED */
.hole.whacked .mole{filter:brightness(.55) sepia(.5)}
.hole.whacked .mf::after{
content:‘✕’;position:absolute;top:-12%;left:50%;transform:translateX(-50%);
font-size:clamp(9px,2.8vw,18px);color:var(–red);text-shadow:1px 1px 0 #000}
/* MISS */
.hole.miss{animation:mshake .28s ease}
@keyframes mshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ═══════ FLOAT LABEL ═══════ */
.flbl{
position:absolute;top:16%;left:50%;transform:translateX(-50%);
font-size:clamp(6px,1.8vw,10px);
color:var(–gold);text-shadow:1px 1px 0 #000,0 0 6px var(–gold);
pointer-events:none;z-index:10;white-space:nowrap;
animation:fup .65s ease-out forwards
}
@keyframes fup{
0%  {opacity:1;transform:translateX(-50%) translateY(0)   scale(1)}
100%{opacity:0;transform:translateX(-50%) translateY(-44%) scale(.8)}
}

/* ═══════ CONTROLS ═══════ */
.controls{display:flex;gap:clamp(7px,2vw,12px);flex-shrink:0;align-items:center}
.btn{
font-family:var(–font);font-size:var(–btn-fs);
padding:clamp(8px,1.8vh,12px) clamp(10px,2.5vw,18px);
border:2px solid #000;cursor:pointer;
box-shadow:3px 3px 0 #000;
transition:transform .1s,box-shadow .1s;
letter-spacing:1px;line-height:1;
-webkit-user-select:none;user-select:none
}
.btn:active,.btn.pr{transform:translate(3px,3px);box-shadow:none}
.bst{background:var(–green);color:#000}
.brs{background:var(–red);color:#fff}
.bsn{background:#15152a;color:var(–gold);border-color:var(–border);
font-size:clamp(14px,3.5vw,20px);padding:clamp(6px,1.3vh,10px) clamp(8px,2vw,12px)}

/* ═══════ OVERLAY ═══════ */
.ov{
position:fixed;inset:0;
background:rgba(0,0,0,.88);
display:flex;align-items:center;justify-content:center;
z-index:200;
padding:calc(16px + var(–safe-top)) 16px calc(16px + var(–safe-bottom));
opacity:1;transition:opacity .2s
}
.ov.hidden{opacity:0;pointer-events:none}
.ovb{
background:var(–bg2);
border:3px solid var(–gold);
box-shadow:0 0 0 2px #000,6px 6px 0 #000,0 0 36px #ffaa0033;
padding:clamp(18px,4.5vw,36px) clamp(18px,5.5vw,44px);
text-align:center;
width:100%;max-width:clamp(260px,82vw,370px);
display:flex;flex-direction:column;align-items:center;
gap:clamp(7px,1.8vh,14px)
}
.ov-title{font-size:clamp(14px,4.5vw,24px);color:var(–gold);text-shadow:3px 3px 0 var(–gold-d),0 0 18px #ffaa0088}
.ov-score{font-size:clamp(26px,7.5vw,46px);color:var(–green);text-shadow:0 0 18px var(–green);line-height:1}
.ov-best{font-size:clamp(7px,1.8vw,10px);color:var(–blue);text-shadow:0 0 8px var(–blue)}
.ov-msg{font-size:clamp(6px,1.6vw,8px);color:#667;line-height:2;max-width:24ch}
.ov-btn{width:100%;font-size:clamp(9px,2.2vw,13px);padding:clamp(10px,2.2vh,15px)}

/* ═══════ LEVEL BADGE ═══════ */
#badge{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:clamp(20px,5.5vw,38px);
color:var(–gold);text-shadow:0 0 36px var(–gold),4px 4px 0 #000;
pointer-events:none;z-index:300;opacity:0;white-space:nowrap
}
#badge.show{animation:bpop .9s ease-out forwards}
@keyframes bpop{
0%  {opacity:0;transform:translate(-50%,-50%) scale(.35)}
25% {opacity:1;transform:translate(-50%,-50%) scale(1.25)}
65% {opacity:1;transform:translate(-50%,-50%) scale(1)}
100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}

/* ═══════ LANDSCAPE PHONE ═══════ */
@media(max-height:500px) and (orientation:landscape){
:root{
–hole:min(21vw,26vh);
–gap:min(1.4vw,1.4vh);
–hud-fs:clamp(11px,2.8vh,17px);
–title-fs:clamp(10px,2.6vh,18px)
}
.subtitle{display:none}
.layout{justify-content:space-between;padding:3px 10px;gap:2px}
}

/* ═══════ VERY SMALL ═══════ */
@media(max-width:330px){
:root{–hole:calc((100vw - 60px)/3);–gap:5px}
}

/* ═══════ TABLET / DESKTOP ═══════ */
@media(min-width:600px){
:root{–hole:clamp(110px,14vw,130px);–gap:clamp(14px,2vw,20px)}
}
@media(min-width:900px){
:root{–hole:130px;–gap:20px}
}
</style>

</head>
<body>

<div id="stars"></div>
<div id="badge"></div>

<div class="layout">

  <div>
    <div class="title">⛏ MOLE MASH ⛏</div>
    <div class="subtitle">PUKUL TIKUSNYA!</div>
  </div>

  <div class="hud">
    <div class="hc"><div class="hl">SCORE</div><div class="hv sc" id="sv">0</div></div>
    <div class="hc"><div class="hl">WAKTU</div><div class="hv tc" id="tv">30</div></div>
    <div class="hc"><div class="hl">LEVEL</div><div class="hv lc" id="lv">1</div></div>
    <div class="hc"><div class="hl">BEST</div> <div class="hv bc" id="bv">0</div></div>
  </div>

  <div class="meta">
    <div class="ptrack"><div class="pfill" id="pf"></div></div>
    <div class="cline" id="cl"></div>
  </div>

  <div class="shell">
    <div class="grid" id="grid"></div>
  </div>

  <div class="controls">
    <button class="btn bst" id="bs">&#9654; MULAI</button>
    <button class="btn brs" id="br">&#8634; RESET</button>
    <button class="btn bsn" id="bn" aria-label="Suara">&#128266;</button>
  </div>

</div>

<!-- Overlay -->

<div class="ov" id="ov">
  <div class="ovb">
    <div class="ov-title" id="ot">MOLE MASH</div>
    <div class="ov-score" id="os" style="display:none"></div>
    <div class="ov-best"  id="ob"></div>
    <div class="ov-msg"   id="om">Pukul tikus<br>secepat mungkin!</div>
    <button class="btn bst ov-btn" id="ob2">&#9654; MAIN SEKARANG</button>
  </div>
</div>

<script>
/* ── STARS ── */
(()=>{
  const c=document.getElementById('stars'),f=document.createDocumentFragment();
  for(let i=0;i<70;i++){
    const s=document.createElement('div');s.className='s';
    const z=Math.random()*2.5+.5;
    s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(1.2+Math.random()*2).toFixed(1)}s;--dl:${(Math.random()*3).toFixed(1)}s`;
    f.appendChild(s);
  }
  c.appendChild(f);
})();

/* ── AUDIO ── */
let snd=true,actx=null;
function getAC(){if(!actx){const C=window.AudioContext||window.webkitAudioContext;if(C)actx=new C();}return actx;}
function beep(o){
  if(!snd)return;const ac=getAC();if(!ac)return;
  const osc=ac.createOscillator(),g=ac.createGain();
  osc.connect(g);g.connect(ac.destination);
  osc.type=o.t||'square';
  const t=ac.currentTime+(o.dl||0);
  osc.frequency.setValueAtTime(o.f,t);
  if(o.ef)osc.frequency.exponentialRampToValueAtTime(o.ef,t+(o.d||.15));
  g.gain.setValueAtTime(o.v||.25,t);
  g.gain.exponentialRampToValueAtTime(.001,t+(o.d||.15));
  osc.start(t);osc.stop(t+(o.d||.15));
}
const SFX={
  hit() {beep({f:440,ef:880,d:.12,v:.28})},
  combo(){beep({f:660,ef:1200,d:.15,v:.3})},
  miss() {beep({t:'sawtooth',f:220,ef:80,d:.18,v:.15})},
  up()   {[523,659,784,1047].forEach((f,i)=>beep({f,d:.16,dl:i*.1,v:.2}))},
  end()  {[350,280,210,140].forEach((f,i)=>beep({t:'sawtooth',f,d:.18,dl:i*.1,v:.18}))},
};

/* ── CONSTANTS ── */
const TOTAL=30;
const LVL_THR=[0,8,20,36,56,80];
const LVL_SPD=[900,700,530,400,300,220];
const LVL_VIS=[1400,1200,1000,800,640,500];

/* ── DOM ── */
const $=id=>document.getElementById(id);
const svEl=$('sv'),tvEl=$('tv'),lvEl=$('lv'),bvEl=$('bv');
const pfEl=$('pf'),clEl=$('cl');
const gridEl=$('grid');
const ovEl=$('ov'),otEl=$('ot'),osEl=$('os'),obEl=$('ob'),omEl=$('om'),ob2El=$('ob2');
const badgeEl=$('badge');
const bsEl=$('bs'),brEl=$('br'),bnEl=$('bn');

/* ── STATE ── */
let score=0,tLeft=TOTAL,level=1,combo=0,running=false;
let hi=parseInt(localStorage.getItem('moleBest')||'0',10);
let mTmr=null,cTmr=null,active=null;
bvEl.textContent=hi;obEl.textContent='BEST: '+hi;

/* ── BUILD GRID ── */
const holes=[];
(()=>{
  const f=document.createDocumentFragment();
  for(let i=0;i<9;i++){
    const h=document.createElement('div');
    h.className='hole';
    h.innerHTML=`<div class="mole"><div class="me l"></div><div class="me r"></div><div class="mb"></div><div class="mf"><div class="mey l"></div><div class="mey r"></div><div class="mn"></div><div class="mm"></div></div><div class="mp l"></div><div class="mp r"></div></div>`;
    h.addEventListener('pointerdown',e=>{e.preventDefault();if(running)hit(h);},{passive:false});
    f.appendChild(h);holes.push(h);
  }
  gridEl.appendChild(f);
})();

/* ── HIT ── */
function hit(h){
  if(h===active){
    combo++;
    const pts=combo>=5?3:combo>=3?2:1;
    score+=pts;
    SFX[combo>=3?'combo':'hit']();
    clearTimeout(mTmr);active=null;
    h.classList.remove('active');h.classList.add('whacked');
    setTimeout(()=>h.classList.remove('whacked'),320);
    floatLabel(h,combo>=3?`+${pts} COMBO!`:`+${pts}`);
    updateHUD();scheduleMole();
  } else {
    combo=0;SFX.miss();
    h.classList.add('miss');setTimeout(()=>h.classList.remove('miss'),280);
    updateCombo();
  }
}
function floatLabel(h,txt){
  const d=document.createElement('div');d.className='flbl';d.textContent=txt;
  h.appendChild(d);setTimeout(()=>d.remove(),700);
}

/* ── MOLE ── */
function spd(){return Math.min(level-1,LVL_SPD.length-1)}
function scheduleMole(){if(!running)return;clearTimeout(mTmr);mTmr=setTimeout(popMole,LVL_SPD[spd()]);}
function popMole(){
  if(!running)return;
  if(active){active.classList.remove('active');combo=0;updateCombo();}
  let idx;
  do{idx=Math.floor(Math.random()*holes.length);}while(holes[idx]===active&&holes.length>1);
  active=holes[idx];active.classList.add('active');
  mTmr=setTimeout(()=>{
    if(active){active.classList.remove('active');active=null;combo=0;updateCombo();}
    scheduleMole();
  },LVL_VIS[spd()]);
}

/* ── HUD ── */
function updateHUD(){
  svEl.textContent=score;pop(svEl);
  const nl=computeLevel();
  if(nl>level){
    level=nl;lvEl.textContent=level;pop(lvEl);
    showBadge('LEVEL '+level+'!');SFX.up();
  }
  pfEl.style.width=computeProg()+'%';
  updateCombo();
  if(score>hi){hi=score;localStorage.setItem('moleBest',hi);bvEl.textContent=hi;pop(bvEl);}
}
function updateCombo(){
  if(combo>=5)     clEl.textContent='🔥🔥 COMBO x'+combo+'!!';
  else if(combo>=3)clEl.textContent='🔥 COMBO x'+combo+'!';
  else if(combo>=2)clEl.textContent='⚡ COMBO x'+combo;
  else             clEl.textContent='';
}
function computeLevel(){for(let i=LVL_THR.length-1;i>=0;i--)if(score>=LVL_THR[i])return i+1;return 1;}
function computeProg(){
  const c=LVL_THR[level-1]||0,n=LVL_THR[level]||(LVL_THR[LVL_THR.length-1]+40);
  return Math.min(100,((score-c)/(n-c))*100);
}
function pop(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
function showBadge(t){badgeEl.textContent=t;badgeEl.classList.remove('show');void badgeEl.offsetWidth;badgeEl.classList.add('show');}

/* ── TIMER ── */
function startCountdown(){
  clearInterval(cTmr);
  cTmr=setInterval(()=>{
    tLeft--;tvEl.textContent=tLeft;
    if(tLeft<=5)tvEl.classList.add('urgent');
    if(tLeft<=0)endGame();
  },1000);
}

/* ── GAME FLOW ── */
function startGame(){
  const ac=getAC();if(ac&&ac.state==='suspended')ac.resume();
  score=0;tLeft=TOTAL;level=1;combo=0;running=true;
  svEl.textContent='0';tvEl.textContent=TOTAL;
  tvEl.classList.remove('urgent');lvEl.textContent='1';
  pfEl.style.width='0%';clEl.textContent='';
  holes.forEach(h=>h.classList.remove('active','whacked','miss'));
  active=null;clearTimeout(mTmr);clearInterval(cTmr);
  ovEl.classList.add('hidden');scheduleMole();startCountdown();
}
function endGame(){
  running=false;clearTimeout(mTmr);clearInterval(cTmr);
  holes.forEach(h=>h.classList.remove('active'));active=null;SFX.end();
  otEl.textContent='GAME OVER!';
  osEl.textContent=score;osEl.style.display='';
  obEl.textContent='BEST: '+hi;
  omEl.innerHTML=score>=hi?'🏆 REKOR BARU!<br>Luar biasa!':'Coba lagi untuk<br>mengalahkan rekormu!';
  ob2El.textContent='▶ MAIN LAGI';
  ovEl.classList.remove('hidden');
}
function toMenu(){
  running=false;clearTimeout(mTmr);clearInterval(cTmr);
  holes.forEach(h=>h.classList.remove('active','whacked','miss'));active=null;
  otEl.textContent='MOLE MASH';osEl.style.display='none';
  obEl.textContent='BEST: '+hi;
  omEl.innerHTML='Pukul tikus<br>secepat mungkin!';
  ob2El.textContent='▶ MAIN SEKARANG';
  ovEl.classList.remove('hidden');
}

/* ── BUTTONS ── */
function mkBtn(el,fn){
  el.addEventListener('pointerdown',()=>el.classList.add('pr'));
  el.addEventListener('pointerup',()=>{el.classList.remove('pr');fn();});
  el.addEventListener('pointerleave',()=>el.classList.remove('pr'));
  el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fn();}});
}
mkBtn(bsEl,startGame);mkBtn(brEl,toMenu);mkBtn(ob2El,startGame);
bnEl.addEventListener('pointerdown',()=>{
  snd=!snd;bnEl.textContent=snd?'🔊':'🔇';
  if(snd){const ac=getAC();if(ac&&ac.state==='suspended')ac.resume();}
});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter')&&!ovEl.classList.contains('hidden'))startGame();
  if(e.key==='r'||e.key==='R')toMenu();
});

/* ── NO CONTEXT MENU ── */
document.addEventListener('contextmenu',e=>e.preventDefault());

/* ── VISIBILITY: PAUSE ── */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&running){
    clearTimeout(mTmr);clearInterval(cTmr);
    holes.forEach(h=>h.classList.remove('active'));active=null;running=false;
    otEl.textContent='PAUSED';osEl.style.display='none';
    obEl.textContent='BEST: '+hi;
    omEl.innerHTML='Kembali ke tab untuk<br>melanjutkan.';
    ob2El.textContent='▶ LANJUTKAN';
    ovEl.classList.remove('hidden');
  }
});
</script>

</body>
